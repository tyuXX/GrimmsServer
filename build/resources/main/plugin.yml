name: GrimmsServer
author: Grimm&tyuXX
description: A spigot plugin made by Grimm and tyuXX, it adds player leveling, a market, money, and more.
website: www.gsdistance.org
prefix: Grimm's
main: org.gsdistance.grimmsServer.GrimmsServer
version: 1.4r4
api-version: 1.20
load: STARTUP
commands:
  sendMoney:
    description: Send money to another player from your balance
    usage: /sendMoney <player> <amount>
    permission: grimmsserver.sendMoney
  makeItemLevelable:
    description: Make the item in your main hand levelable (costs 3500 money, requires level 10+)
    usage: /makeItemLevelable
    permission: grimmsserver.makeItemLevelable
  setPlayerStat:
    description: Set a specific stat for any player (admin only)
    usage: /setPlayerStat <player> <statId> <value>
    permission: grimmsserver.setPlayerStat
  addTitle:
    description: Add a title to a player (admin only)
    usage: /addTitle <player> <title>
    permission: grimmsserver.addTitle
  executePlayer:
    description: Execute a player (requires Executioner title)
    usage: /executePlayer <player>
    permission: grimmsserver.executePlayer
  grimmsServerCommands:
    description: List all available GrimmsServer commands
    usage: /grimmsServerCommands
  withdrawMoney:
    description: Withdraw money from your balance into physical banknotes
    usage: /withdrawMoney <amount> [banknoteCount]
    permission: grimmsserver.withdrawMoney
  depositMoney:
    description: Deposit banknotes by holding them in your main hand
    usage: /depositMoney
    permission: grimmsserver.depositMoney
  acceptRequest:
    description: Accept a pending request by ID
    usage: /acceptRequest <requestId>
    permission: grimmsserver.acceptRequest
  removeTitle:
    description: Remove a title from a player (admin only)
    usage: /removeTitle <player> <title>
    permission: grimmsserver.removeTitle
  gFaction:
    description: Manage factions - create, join, leave, claim land, and manage members
    usage: /gFaction <invite|join|leave|kick|info|new|claim|unclaim|setrank|unclaimall> [args]
    permission: grimmsserver.faction
  home:
    description: Manage your homes - set, teleport, list, or delete
    usage: /home <sethome|tp|homes|delhome> [args]
    permission: grimmsserver.home
  nick:
    description: Change your nickname or set another player's nickname (admin)
    usage: /nick <nickname> OR /nick <player> <nickname>
    permission: grimmsserver.nick
  market:
    description: Access the market system for buying, selling, enchanting, and viewing stock
    usage: /market <get|stock|ripoff|enchant|potioneffect|tp|sell|sellall|buy|enchcosts|info> [args]
    permission: grimmsserver.market
  gLog:
    description: View statistics for yourself, other players, worlds, or leaderboards
    usage: /gLog <self_stats|other_stats|self_titles|other_titles|world|leaderboard|commands|chunk> [args]
    permission: grimmsserver.log
  gDim:
    description: Manage custom dimensions - create, delete, teleport, list, or get info
    usage: /gDim <create|delete|tp|list|info> [args]
    permission: grimmsserver.dimensions
  gUtil:
    description: Utility commands for version info, relics, capabilities, and settings
    usage: /gUtil <version|relic|capability|setting> [args]
    permission: grimmsserver.util
  gConfig:
    description: Manage server configuration - dump config or reload settings
    usage: /gConfig <dump|reload>
    permission: grimmsserver.config
  job:
    description: Manage your job - log jobs, take jobs, or buy education
    usage: /job <log|take|buyedu> [args]
    permission: grimmsserver.job
  gHelp:
    description: Get detailed help for any GrimmsServer command
    usage: /gHelp [command]
    permission: grimmsserver.ghelp
  gAuth:
    description: Offline mode authentication - register, login, or unregister
    usage: /gAuth <register|login|unregister> <password>
    permission: grimmsserver.gauth
  gDeco:
    description: Manage player decorations - set or clear decorative titles
    usage: /gDeco <setdecotitle|cleardecotitle>
    permission: grimmsserver.gdeco
permissions:
  grimmsserver.sendMoney:
    description: Allows sending money to other players from your balance
    default: true
  grimmsserver.makeItemLevelable:
    description: Allows making items levelable for XP gain and stat bonuses
    default: true
  grimmsserver.setPlayerStat:
    description: Allows setting any player's stats directly (admin only)
    default: op
  grimmsserver.addTitle:
    description: Allows granting titles to players (admin only)
    default: op
  grimmsserver.executePlayer:
    description: Allows executing players with the Executioner title
    default: true
  grimmsserver.multiHome:
    description: Allows setting multiple homes instead of just one
    default: op
  grimmsserver.home:
    description: Allows using home teleportation commands
    default: true
  grimmsserver.withdrawMoney:
    description: Allows withdrawing money into physical banknotes for trading
    default: true
  grimmsserver.depositMoney:
    description: Allows depositing banknotes back into your balance
    default: true
  grimmsserver.acceptRequest:
    description: Allows accepting pending requests (faction invites, etc.)
    default: true
  grimmsserver.removeTitle:
    description: Allows removing titles from players (admin only)
    default: op
  grimmsserver.faction:
    description: Allows using faction commands for group gameplay
    default: true
  grimmsserver.factionAdmin:
    description: Allows administrative faction commands (admin only)
    default: op
  grimmsserver.nick:
    description: Allows changing your own display nickname
    default: true
  grimmsserver.nick.others:
    description: Allows changing other players' nicknames (admin only)
    default: op
  grimmsserver.market:
    description: Allows using the market for buying, selling, and enchanting
    default: true
  grimmsserver.log:
    description: Allows viewing various statistics and logs
    default: true
  grimmsserver.log.self:
    description: Allows viewing your own statistics and titles
    default: true
  grimmsserver.log.other:
    description: Allows viewing other players' statistics (admin only)
    default: op
  grimmsserver.dimensions:
    description: Allows managing custom dimensions (admin only)
    default: op
  grimmsserver.util:
    description: Allows using general utility commands
    default: true
  grimmsserver.util.admin:
    description: Allows using administrative utility commands (admin only)
    default: op
  grimmsserver.config:
    description: Allows modifying server configuration (admin only)
    default: op
  grimmsserver.faction.bypass:
    description: Allows bypassing faction claim restrictions
    default: op
  grimmsserver.job:
    description: Allows using the job system for income
    default: true
  grimmsserver.ghelp:
    description: Allows using the help command system
    default: true
  grimmsserver.gauth:
    description: Allows using offline mode authentication
    default: true
  grimmsserver.gdeco:
    description: Allows using player decoration options
    default: true